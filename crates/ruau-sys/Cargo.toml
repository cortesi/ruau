[package]
name = "ruau-sys"
version = "0.11.0-rc.1"
authors = ["Aleksandr Orlenko <zxteam@pm.me>"]
rust-version = "1.88"
edition = "2024"
documentation = "https://docs.rs/ruau-sys"
readme = "README.md"
categories = ["external-ffi-bindings"]
license = "MIT"
links = "luau"
build = "build/main.rs"
description = """
Low level (FFI) bindings to Luau.
"""

[package.metadata.docs.rs]
features = ["luau"]
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["luau"]
luau = ["luau0-src"]
luau-codegen = ["luau"]
luau-vector4 = ["luau"]

[dependencies]
libc = "0.2"

[build-dependencies]
cc = "1.0"
cfg-if = "1.0"
pkg-config = "0.3.17"
luau0-src = { version = "0.20.0", optional = true }

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(raw_dylib)'] }
