[package]
name = "ruau"
version = "0.12.0-rc.1" # remember to update ruau_derive
authors.workspace = true
rust-version.workspace = true
edition.workspace = true
documentation = "https://docs.rs/ruau"
readme = "../../README.md"
keywords = ["luau", "async", "scripting"]
categories = ["api-bindings", "asynchronous"]
license.workspace = true
description = """
High level bindings to Luau with async/await features.
"""

[package.metadata.docs.rs]
features = ["async", "serde", "macros"]
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
luau-jit = ["ffi/luau-codegen"]
luau-vector4 = ["ffi/luau-vector4"]
async = ["dep:futures-util"]
error-send = []
serde = ["dep:serde", "dep:erased-serde", "dep:serde-value", "bstr/serde"]
macros = ["dep:ruau_derive", "ruau_derive/macros"]
anyhow = ["dep:anyhow", "error-send"]
userdata-wrappers = ["parking_lot/send_guard"]

# deprecated features
serialize = ["serde"]

[dependencies]
ruau_derive = { version = "=0.11.0", optional = true, path = "../ruau_derive" }
bstr = { version = "1.0", features = ["std"], default-features = false }
either = "1.0"
num-traits = { version = "0.2.14" }
rustc-hash = "2.0"
futures-util = { version = "0.3", optional = true, default-features = false, features = ["std"] }
serde = { version = "1.0", optional = true }
erased-serde = { version = "0.4", optional = true }
serde-value = { version = "0.7", optional = true }
parking_lot = { version = "0.12", features = ["arc_lock"] }
anyhow = { version = "1.0", optional = true }
libc = "0.2"

ffi = { package = "ruau-sys", version = "0.11.0-rc.1", path = "../ruau-sys" }

[dev-dependencies]
trybuild = "1.0"
tokio = { version = "1.0", features = ["macros", "rt", "time"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["arbitrary_precision"] }
maplit = "1.0"
static_assertions = "1.0"

[target.'cfg(not(target_family = "wasm"))'.dev-dependencies]
hyper = { version = "1.2", features = ["full"] }
hyper-util = { version = "0.1.3", features = ["full"] }
http-body-util = "0.1.1"
reqwest = { version = "0.13", features = ["json"] }
tempfile = "3"
criterion = { version = "0.8", features = ["async_tokio"] }
rustyline = "18.0"
tokio = { version = "1.0", features = ["full"] }

[lints]
workspace = true

[[bench]]
name = "benchmark"
harness = false
required-features = ["async"]

[[bench]]
name = "serde"
harness = false
required-features = ["serde"]

[[example]]
name = "async_http_client"
required-features = ["async", "macros"]

[[example]]
name = "async_http_reqwest"
required-features = ["async", "serde", "macros"]

[[example]]
name = "guided_tour"
required-features = ["macros"]

[[example]]
name = "serde"
required-features = ["serde"]

[[example]]
name = "userdata"
required-features = ["macros"]
